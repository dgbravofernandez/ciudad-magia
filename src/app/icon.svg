<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo rosa con esquinas redondeadas (campo de fútbol vista cenital) -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
  </defs>
  <!-- Borde exterior del campo -->
  <rect x="6" y="6" width="52" height="52" rx="8" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- Línea de medio campo -->
  <line x1="6" y1="32" x2="58" y2="32" stroke="#ffffff" stroke-width="2"/>
  <!-- Círculo central -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- Punto central (sutil) -->
  <circle cx="32" cy="32" r="2" fill="#ffffff"/>
  <!-- Porterías (top + bottom) -->
  <rect x="24" y="4" width="16" height="6" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="24" y="54" width="16" height="6" fill="none" stroke="#ffffff" stroke-width="2"/>
</svg>
