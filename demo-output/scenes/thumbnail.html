<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,sans-serif}
body{width:1200px;height:675px;background:linear-gradient(135deg,#EC4899,#BE185D);display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden;padding:60px;position:relative}
.bg-blob1{position:absolute;top:-100px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,#F9A8D4 0%,transparent 70%);filter:blur(60px);opacity:0.5}
.bg-blob2{position:absolute;bottom:-100px;left:-100px;width:400px;height:400px;background:radial-gradient(circle,#9D174D 0%,transparent 70%);filter:blur(60px);opacity:0.6}
.layout{display:grid;grid-template-columns:1.2fr 1fr;gap:60px;align-items:center;width:100%;z-index:1}
.brand{display:inline-flex;align-items:center;gap:14px;margin-bottom:24px}
.logo-c{width:56px;height:56px;border-radius:14px;background:#fff;color:#BE185D;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900}
.brand-name{font-size:38px;font-weight:900;letter-spacing:-0.02em}
h1{font-size:64px;font-weight:900;letter-spacing:-0.03em;line-height:1.05;margin-bottom:20px}
.sub{font-size:24px;color:rgba(255,255,255,0.95);font-weight:500;margin-bottom:20px}
.duration{display:inline-block;background:rgba(0,0,0,0.3);padding:8px 20px;border-radius:999px;font-size:16px;font-weight:700}
.play-wrap{display:flex;align-items:center;justify-content:center}
.play-button{width:200px;height:200px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 30px 80px rgba(0,0,0,0.4);position:relative}
.play-button::after{content:'';width:0;height:0;border-left:60px solid #BE185D;border-top:40px solid transparent;border-bottom:40px solid transparent;margin-left:14px}
.play-ring{position:absolute;width:240px;height:240px;border:6px solid rgba(255,255,255,0.4);border-radius:50%}
</style></head><body>
<div class="bg-blob1"></div>
<div class="bg-blob2"></div>
<div class="layout">
  <div>
    <div class="brand">
      <div class="logo-c">C</div>
      <div class="brand-name">cluberly</div>
    </div>
    <h1>Mira Cluberly<br/>en 60 segundos</h1>
    <div class="sub">Cómo funciona el día a día de un club que se gestiona solo.</div>
    <div class="duration">▶ 60 segundos · Vídeo demo</div>
  </div>
  <div class="play-wrap">
    <div style="position:relative">
      <div class="play-ring"></div>
      <div class="play-button"></div>
    </div>
  </div>
</div>
</body></html>
