<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,sans-serif}
body{width:1920px;height:1080px;background:linear-gradient(135deg,#1F2937,#0F172A);display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden;position:relative}
.bg-blob1{position:absolute;top:-200px;left:-100px;width:600px;height:600px;background:radial-gradient(circle,#EC489960 0%,transparent 70%);filter:blur(60px)}
.bg-blob2{position:absolute;bottom:-200px;right:-100px;width:700px;height:700px;background:radial-gradient(circle,#BE185D50 0%,transparent 70%);filter:blur(60px)}
.container{text-align:center;z-index:1;animation:fadeUp 0.8s cubic-bezier(0.16,1,0.3,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.eyebrow{font-size:28px;color:#EC4899;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:48px}
h1{font-size:120px;font-weight:900;letter-spacing:-0.04em;line-height:1;background:linear-gradient(90deg,#fff 0%,#FBCFE8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.highlight{background:linear-gradient(90deg,#EC4899,#F472B6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:42px;color:#94A3B8;margin-top:48px;font-weight:400}
</style></head><body>
<div class="bg-blob1"></div>
<div class="bg-blob2"></div>
<div class="container">
  <div class="eyebrow">Cluberly · Software para clubes</div>
  <h1>¿Cuántas <span class="highlight">horas</span><br/>pierdes con Excel?</h1>
  <div class="sub">El club que se gestiona solo</div>
</div>
</body></html>
