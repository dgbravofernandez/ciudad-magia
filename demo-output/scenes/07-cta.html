<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,sans-serif}
body{width:1920px;height:1080px;background:linear-gradient(135deg,#EC4899,#BE185D);display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden;padding:80px;position:relative}
.bg-blob1{position:absolute;top:-200px;right:-200px;width:700px;height:700px;background:radial-gradient(circle,#F9A8D4 0%,transparent 70%);filter:blur(80px);opacity:0.5}
.bg-blob2{position:absolute;bottom:-200px;left:-100px;width:600px;height:600px;background:radial-gradient(circle,#9D174D 0%,transparent 70%);filter:blur(60px);opacity:0.6}
.center{text-align:center;z-index:1;max-width:1400px}
.brand{display:inline-flex;align-items:center;gap:20px;margin-bottom:48px}
.logo-c{width:96px;height:96px;border-radius:24px;background:#fff;color:#BE185D;display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:900;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
.brand-name{font-size:72px;font-weight:900;letter-spacing:-0.03em}
h1{font-size:110px;font-weight:900;letter-spacing:-0.04em;line-height:1.05;margin-bottom:32px}
.sub{font-size:38px;color:rgba(255,255,255,0.95);font-weight:500;margin-bottom:56px}
.cta{display:inline-block;background:#fff;color:#BE185D;padding:32px 80px;border-radius:20px;font-size:38px;font-weight:900;box-shadow:0 30px 80px rgba(0,0,0,0.3);letter-spacing:-0.01em}
.trust{margin-top:36px;display:flex;gap:32px;justify-content:center;font-size:22px;color:rgba(255,255,255,0.85);font-weight:500}
.trust div{display:flex;align-items:center;gap:10px}
.url{margin-top:32px;font-size:28px;font-weight:700;color:#fff;background:rgba(255,255,255,0.15);padding:14px 32px;border-radius:999px;display:inline-block}
</style></head><body>
<div class="bg-blob1"></div>
<div class="bg-blob2"></div>
<div class="center">
  <div class="brand">
    <div class="logo-c">C</div>
    <div class="brand-name">cluberly</div>
  </div>
  <h1>Empieza hoy.<br/>Cobra mañana.</h1>
  <div class="sub">14 días gratis. Sin tarjeta. Cancela cuando quieras.</div>
  <div class="cta">Probar 14 días gratis →</div>
  <div class="trust">
    <div>✓ Sin compromiso</div>
    <div>✓ Migración asistida</div>
    <div>✓ Soporte en español</div>
  </div>
  <div class="url">cluberly.club</div>
</div>
</body></html>
