<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,sans-serif}
body{width:1920px;height:1080px;background:#FDF2F8;display:flex;align-items:center;justify-content:center;color:#0F172A;overflow:hidden;padding:80px}
.center{text-align:center;max-width:1400px}
.eyebrow{display:inline-block;background:#BE185D;color:#fff;padding:12px 32px;border-radius:999px;font-size:24px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:40px}
h2{font-size:88px;font-weight:900;letter-spacing:-0.03em;line-height:1.05;color:#0F172A;margin-bottom:60px}
.gradient{background:linear-gradient(90deg,#EC4899,#BE185D);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:48px;margin-top:48px}
.stat{background:#fff;border:1px solid #FBCFE8;border-radius:24px;padding:48px 32px;box-shadow:0 20px 40px rgba(236,72,153,0.1)}
.stat-num{font-size:96px;font-weight:900;line-height:1;background:linear-gradient(90deg,#EC4899,#BE185D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.04em;margin-bottom:16px}
.stat-label{font-size:22px;color:#0F172A;font-weight:600}
.stat-sub{font-size:16px;color:#94A3B8;margin-top:6px}
</style></head><body>
<div class="center">
  <div class="eyebrow">★ Validado en producción</div>
  <h2>Un año <span class="gradient">funcionando</span><br/>en un club real.</h2>
  <div class="stats">
    <div class="stat">
      <div class="stat-num">900</div>
      <div class="stat-label">jugadores activos</div>
      <div class="stat-sub">3 categorías · 35 equipos</div>
    </div>
    <div class="stat">
      <div class="stat-num">4-6h</div>
      <div class="stat-label">ahorradas a la semana</div>
      <div class="stat-sub">según tesorería</div>
    </div>
    <div class="stat">
      <div class="stat-num">5min</div>
      <div class="stat-label">cierre de caja mensual</div>
      <div class="stat-sub">antes ocupaba un día</div>
    </div>
  </div>
</div>
</body></html>
