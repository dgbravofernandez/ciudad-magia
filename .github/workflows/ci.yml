name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Build · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Nota: `npm run lint` (next lint) está deprecado y sin ESLint configurado
      # en este repo (INFRA-2). El gate real es el typecheck + tests + build.
      # Cuando se migre a la ESLint CLI, reañadir aquí un paso de lint.
      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Valores dummy para que el build no falle por env ausentes en CI.
          # NO son secretos reales; el build solo necesita que existan.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-key
          NEXT_PUBLIC_APP_URL: https://example.com
          APP_SECRET: dummy-app-secret
          CRON_SECRET: dummy-cron-secret
